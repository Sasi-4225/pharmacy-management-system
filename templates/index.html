{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - 24 Pharmacy</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial,sans-serif;
            color:white;
            text-align:center;
            overflow:hidden;
        }

        .video-container{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            overflow:hidden;
        }

        .video-container video{
            width:100%;
            height:100%;
            object-fit:cover;
        }

        .overlay{
            position:absolute;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(0,0,0,.5);

            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
        }

        .overlay img{
            width:150px;
            margin-bottom:20px;
        }

        .overlay h1{
            font-size:3rem;
            margin-bottom:20px;
        }

        .get-started-btn{
            padding:15px 30px;
            font-size:18px;
            background:#0fbff5;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        .get-started-btn:hover{
            background:#0aa3d1;
        }
    </style>

</head>

<body>

<div class="video-container">

    <video autoplay muted loop playsinline>
        <source src="{% static 'images/pharma.mp4' %}" type="video/mp4">
    </video>

</div>

<div class="overlay">

    <img src="{% static 'images/pharmacy.jpg' %}" alt="Pharmacy Logo">

    <h1>Welcome to 24 Pharmacy</h1>

    <button class="get-started-btn"
        onclick="window.location.href='/login/'">
        Get Started
    </button>

</div>

</body>
</html>
