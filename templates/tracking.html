{% load static %}
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Track Order</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
}

.header{
background:#0fbff5;
color:white;
padding:15px;
text-align:center;
font-size:28px;
}

.container{

width:70%;
margin:40px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.2);

}

h2{

text-align:center;
color:#0fbff5;

}

.info{

font-size:20px;
margin:20px 0;

}

.step{

padding:15px;
margin:15px 0;
border-radius:8px;
background:#eee;
font-size:20px;

}

.active{

background:#28a745;
color:white;

}

.pending{

background:#ddd;

}

</style>

</head>

<body>

<div class="header">

24 Pharmacy Order Tracking

</div>

<div class="container">

<h2>Track Your Order</h2>

<div class="info">

<b>Tracking ID :</b>

<span id="tracking"></span>

</div>

<div class="step active">
✅ Order Placed
</div>

<div class="step" id="payment">
💳 Payment Successful
</div>

<div class="step" id="packed">
📦 Packed
</div>

<div class="step" id="delivery">
🚚 Out For Delivery
</div>

<div class="step" id="done">
🏠 Delivered
</div>

</div>

<script>

fetch("/tracking-data/")

.then(res=>res.json())

.then(data=>{

document.getElementById("tracking").innerHTML=data.tracking_id;

if(data.status=="Payment Successful"){

document.getElementById("payment").classList.add("active");

}

if(data.status=="Packed"){

payment.classList.add("active");
packed.classList.add("active");

}

if(data.status=="Out For Delivery"){

payment.classList.add("active");
packed.classList.add("active");
delivery.classList.add("active");

}

if(data.status=="Delivered"){

payment.classList.add("active");
packed.classList.add("active");
delivery.classList.add("active");
done.classList.add("active");

}

});

</script>

</body>

</html>
