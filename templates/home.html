{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>24 Pharmacy</title>

    <style>
        body{
            font-family:Arial,sans-serif;
            margin:0;
            padding:0;
            color:black;
        }

        .header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            background:#0fbff5;
            padding:15px;
            color:white;
        }

        .header img{
            height:40px;
        }

        .nav-links button{
            background:transparent;
            border:1px solid white;
            padding:8px 15px;
            border-radius:5px;
            color:white;
            font-size:16px;
            cursor:pointer;
            margin:0 10px;
            transition:.3s;
        }

        .nav-links button:hover{
            background:white;
            color:#0fbff5;
        }

        .navbar{
            background:#9fcffc;
            padding:10px;
            text-align:center;
            color:white;
            font-size:24px;
        }

        .search-bar{
            text-align:center;
            margin:20px;
        }

        .search-bar input{
            width:350px;
            padding:10px;
        }

        .search-bar button{
            padding:10px 20px;
            cursor:pointer;
        }

        .popular-search{
            text-align:center;
            font-size:22px;
            font-weight:bold;
            margin:20px;
        }

        .slider-container{
            width:100%;
            overflow:hidden;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .slider{
            display:flex;
            width:300%;
            transition:transform 1s;
        }

        .slide{
            width:100%;
            flex:0 0 100%;
            text-align:center;
        }

        .slide img{
            width:400px;
            height:300px;
            object-fit:cover;
            border-radius:10px;
        }

        .footer{
            text-align:center;
            padding:15px;
        }
    </style>

</head>

<body>

<div class="header">

    <img src="{% static 'images/pharmacy.jpg' %}" alt="Company Logo">

    <div class="nav-links">

        <button onclick="location.href='/home/'">Home</button>

        <button onclick="location.href='/products/'">Products</button>

        <button onclick="location.href='/cart/'">Add To Cart</button>

        <button onclick="location.href='/orders/'">Orders</button>

        <button onclick="location.href='/login/'">Login</button>

    </div>

</div>

<div class="navbar">
    24 Pharmacy
</div>

<div class="search-bar">

    <input
        type="text"
        id="search"
        placeholder="Search medicines...">

    <button onclick="searchProduct()">
        Search
    </button>

</div>

<div class="popular-search">
    Popular Searches
</div>

<div class="slider-container">

    <div class="slider">

        <div class="slide">
            <img src="{% static 'images/download.jpg' %}">
        </div>

        <div class="slide">
            <img src="{% static 'images/image2.jpg' %}">
        </div>

        <div class="slide">
            <img src="{% static 'images/image3.jpg' %}">
        </div>

    </div>

</div>

<div class="footer">
    © 2025 Pharmacy Store. All Rights Reserved.
</div>

<script>

let index=0;

function slideShow(){

    const slides=document.querySelector(".slider");

    index=(index+1)%3;

    slides.style.transform=`translateX(-${index*100}%)`;

}

setInterval(slideShow,3000);

function searchProduct(){

    let product=document.getElementById("search").value;

    if(product==""){

        alert("Enter Product Name");

        return;

    }

    window.location.href="/products/?search="+product;

}

</script>

</body>
</html>
